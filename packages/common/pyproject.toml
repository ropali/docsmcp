[project]
name = "docsmcp-common"
version = "0.1.0"
description = "Shared infrastructure and contracts for DocsMCP apps."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "boto3>=1.40.0",
  "loguru>=0.7.3",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["common"]
