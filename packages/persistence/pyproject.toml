[project]
name = "docsmcp-persistence"
version = "0.1.0"
description = "Shared database models and repositories for DocsMCP apps."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "docsmcp-common",
  "sqlalchemy>=2.0.48",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["persistence"]

[tool.uv.sources]
docsmcp-common = { workspace = true }
